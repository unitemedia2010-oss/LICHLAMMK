<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Unite Work Schedule | Đăng nhập</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="brand-badge">UNITE</div>
      <h1>Work Schedule</h1>
      <p class="muted">Hệ thống đăng ký lịch làm, xin nghỉ và quản lý TTS/NVPT.</p>

      <form id="loginForm" class="form-stack">
        <label>
          Email
          <input id="email" type="email" placeholder="Nhập email đăng nhập" autocomplete="email" required />
        </label>

        <label>
          Mật khẩu
          <input id="password" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password" required />
        </label>

        <button class="btn primary" type="submit">Đăng nhập</button>
        <p id="loginMessage" class="message"></p>
      </form>

      <div class="hint-box">
        <b>Ghi chú:</b> Tài khoản do Admin/HR tạo. TTS/NVPT không tự đăng ký tài khoản.
      </div>
    </section>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
